services:
  - type: web
    name: customer-intelligence-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DB_HOST
        value: localhost
      - key: DB_NAME
        value: customer_intelligence_db
